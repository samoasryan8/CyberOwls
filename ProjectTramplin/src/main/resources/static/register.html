<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Գրանցում - Трамплин</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen py-10">
    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
        <h2 class="text-2xl font-bold text-center mb-6 text-gray-900">Ստեղծել նոր հաշիվ</h2>
        
        <form action="login.html" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Անուն Ազգանուն / Ընկերության անուն</label>
                <input type="text" class="w-full mt-1 px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Էլ. փոստ</label>
                <input type="email" class="w-full mt-1 px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Գաղտնաբառ</label>
                <input type="password" class="w-full mt-1 px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none" required>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Ո՞վ եք դուք</label>
                <div class="grid grid-cols-2 gap-3">
                    <label class="border rounded-lg p-3 flex items-center gap-2 cursor-pointer hover:bg-gray-50">
                        <input type="radio" name="role" value="APPLICANT" checked class="text-blue-600">
                        <span class="text-sm font-medium">Դիմորդ</span>
                    </label>
                    <label class="border rounded-lg p-3 flex items-center gap-2 cursor-pointer hover:bg-gray-50">
                        <input type="radio" name="role" value="EMPLOYER" class="text-blue-600">
                        <span class="text-sm font-medium">Գործատու</span>
                    </label>
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-2.5 rounded-lg hover:bg-blue-700 font-medium transition-colors mt-4">Գրանցվել</button>
        </form>
        
        <p class="text-center text-sm text-gray-500 mt-6">
            Արդեն ունե՞ք հաշիվ: <a href="login.html" class="text-blue-600 hover:underline font-medium">Մուտք գործել</a>
        </p>
    </div>
</body>
</html>
