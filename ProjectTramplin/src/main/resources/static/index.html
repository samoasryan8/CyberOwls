<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трамплин (Ոստյուն) - Գլխավոր</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="bg-gray-50 font-sans text-gray-900 h-screen flex flex-col overflow-hidden">

    <!-- Նավիգացիա -->
    <nav class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 md:px-8 shrink-0 z-50 relative">
        <div class="flex items-center gap-2 text-blue-600 font-bold text-xl tracking-tight">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white">
                <i data-lucide="briefcase" class="w-5 h-5"></i>
            </div>
            Трамплин
        </div>
        <div class="flex items-center gap-4" id="navAuth">
            <!-- Այստեղ auth.js-ը կտեղադրի հղումները -->
        </div>
    </nav>

    <!-- Հիմնական բովանդակություն -->
    <div class="flex flex-1 overflow-hidden relative">
        
        <!-- Ձախ վահանակ -->
        <div class="w-full md:w-[450px] lg:w-[500px] flex flex-col bg-white border-r border-gray-200 z-10 shadow-lg">
            
            <!-- Ֆիլտրեր -->
            <div class="p-4 border-b border-gray-100 flex flex-col gap-3 shrink-0 bg-white">
                <div class="relative">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 w-4 h-4"></i>
                    <input type="text" id="searchInput" placeholder="Որոնել աշխատանք, ընկերություն..." 
                           class="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none text-sm">
                </div>
                
                <!-- ՆՈՐ ՖԻԼՏՐԵՐ -->
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="salaryMin" placeholder="Նվազ. աշխատավարձ (AMD)" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm outline-none focus:border-blue-500">
                    <select id="formatFilter" class="w-full bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-lg px-3 py-2 outline-none focus:border-blue-500">
                        <option value="">Բոլոր ֆորմատները</option>
                        <option value="OFFICE">Գրասենյակ (Office)</option>
                        <option value="REMOTE">Հեռավար (Remote)</option>
                        <option value="HYBRID">Հիբրիդ (Hybrid)</option>
                    </select>
                </div>
                <div>
                    <input type="text" id="skillsFilter" placeholder="Հմտություններ (օր. Java, Python, SQL ստորակետով)" 
                           class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm outline-none focus:border-blue-500">
                </div>
            </div>

            <!-- Աշխատանքների ցանկ -->
            <div id="jobList" class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50">
                <!-- JavaScript-ով կավելացվեն աշխատանքները -->
            </div>
        </div>

        <!-- Աջ վահանակ (Քարտեզ) -->
        <div id="map" class="flex-1 bg-gray-200 z-0"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
