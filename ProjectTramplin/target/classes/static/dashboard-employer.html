<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Կաբինետ - Գործատու</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900">
    
    <nav class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 md:px-8">
        <div class="flex items-center gap-2 text-blue-600 font-bold text-xl tracking-tight">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white">Т</div>
            Трамплин
        </div>
        <div class="flex items-center gap-4" id="navAuth"></div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 py-8 flex flex-col md:flex-row gap-8">
        
        <div class="w-full md:w-64 shrink-0">
            <div class="bg-white rounded-2xl border border-gray-200 p-6 mb-4 text-center shadow-sm">
                <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center text-2xl font-bold mx-auto mb-3" id="userAvatar">C</div>
                <h2 class="font-bold text-lg" id="userName">Company Name</h2>
                <p class="text-sm text-gray-500">Գործատու</p>
                <div class="mt-2 inline-flex items-center gap-1 px-2 py-1 bg-green-50 text-green-700 text-xs rounded-md border border-green-200">
                    Վերիֆիկացված
                </div>
            </div>
            <nav class="space-y-1">
                <button onclick="showTab('jobs')" id="tab-jobs" class="w-full text-left px-4 py-2.5 rounded-xl bg-blue-50 text-blue-700 font-medium transition-colors">Իմ Հայտարարությունները</button>
                <button onclick="showTab('create')" id="tab-create" class="w-full text-left px-4 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 font-medium transition-colors">Ստեղծել Նորը</button>
                <button onclick="showTab('applicants')" id="tab-applicants" class="w-full text-left px-4 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 font-medium transition-colors">Դիմորդներ</button>
            </nav>
        </div>

        <div class="flex-1 bg-white rounded-2xl border border-gray-200 p-6 shadow-sm min-h-[500px]">
            
            <div id="content-jobs">
                <h3 class="text-xl font-bold mb-6 text-gray-900">Ակտիվ Հայտարարություններ</h3>
                <div class="space-y-3">
                    <div class="border border-gray-200 rounded-xl p-4 flex justify-between items-center">
                        <div>
                            <h4 class="font-bold text-gray-900">Junior Spring Boot Developer</h4>
                            <p class="text-sm text-gray-500">Դիտումներ: 145 • Դիմումներ: 12</p>
                        </div>
                        <div class="flex gap-2">
                            <button class="text-gray-500 hover:text-blue-600 px-3 py-1 border rounded-lg text-sm">Խմբագրել</button>
                            <button class="text-red-500 hover:bg-red-50 px-3 py-1 border border-red-200 rounded-lg text-sm">Փակել</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Ստեղծել նորը -->
            <div id="content-create" class="hidden">
                <h3 class="text-xl font-bold mb-6 text-gray-900">Տեղադրել նոր աշխատանք</h3>
                <form class="space-y-4 max-w-2xl">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Վերնագիր</label>
                        <input type="text" class="w-full border border-gray-300 px-4 py-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Նվազագույն աշխատավարձ</label>
                            <input type="number" class="w-full border border-gray-300 px-4 py-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Առավելագույն աշխատավարձ</label>
                            <input type="number" class="w-full border border-gray-300 px-4 py-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Ֆորմատ</label>
                        <select class="w-full border border-gray-300 px-4 py-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="OFFICE">Գրասենյակ</option>
                            <option value="REMOTE">Հեռավար</option>
                            <option value="HYBRID">Հիբրիդ</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Նկարագրություն</label>
                        <textarea class="w-full border border-gray-300 px-4 py-2 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none h-32"></textarea>
                    </div>
                    <button type="button" class="bg-blue-600 text-white px-6 py-2.5 rounded-lg hover:bg-blue-700 font-medium">Հրապարակել</button>
                </form>
            </div>

            <!-- Դիմորդներ -->
            <div id="content-applicants" class="hidden">
                <h3 class="text-xl font-bold mb-6 text-gray-900">Նոր Դիմորդներ</h3>
                <div class="space-y-4">
                    <div class="border border-gray-200 rounded-xl p-4">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <h4 class="font-bold text-gray-900 text-lg">Արամ Խաչատրյան</h4>
                                <p class="text-sm text-blue-600 font-medium">Դիմել է՝ Junior Spring Boot Developer</p>
                            </div>
                            <a href="#" class="text-sm text-gray-500 underline hover:text-blue-600">Դիտել Ռեզյումեն</a>
                        </div>
                        <p class="text-sm text-gray-600 mb-4">Հմտություններ: Java, Spring Boot, MySQL, Git</p>
                        <div class="flex gap-2">
                            <button class="bg-green-600 text-white px-4 py-1.5 rounded-lg text-sm font-medium hover:bg-green-700">Ընդունել (Հարցազրույց)</button>
                            <button class="bg-red-50 text-red-600 px-4 py-1.5 rounded-lg text-sm font-medium hover:bg-red-100">Մերժել</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        const user = checkAuth(true);
        if(user.role !== 'EMPLOYER') window.location.href = 'index.html';
        
        document.getElementById('userName').innerText = user.name;
        document.getElementById('userAvatar').innerText = user.name.charAt(0);
        updateNavbar();

        function showTab(tab) {
            ['jobs', 'create', 'applicants'].forEach(t => {
                document.getElementById('content-' + t).classList.add('hidden');
                document.getElementById('tab-' + t).className = 'w-full text-left px-4 py-2.5 rounded-xl text-gray-600 hover:bg-gray-50 font-medium transition-colors';
            });
            document.getElementById('content-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).className = 'w-full text-left px-4 py-2.5 rounded-xl bg-blue-50 text-blue-700 font-medium transition-colors';
        }
    </script>
</body>
</html>
